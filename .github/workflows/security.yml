# .github/workflows/security.yml — php-monorepo
#
# Security scanning — weekly + on every push to main.

name: Security

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"

jobs:
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2
          coverage: none

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Composer audit (all workspaces)
        run: |
          for dir in applications/*/  modules/*/; do
            if [ -f "$dir/composer.json" ]; then
              echo "→ composer audit in $dir"
              composer audit --working-dir="$dir" --format=plain || true
            fi
          done

  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          # PHP is not a supported CodeQL language — javascript only.
          languages: javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
