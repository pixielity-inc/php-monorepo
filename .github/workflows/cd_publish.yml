# .github/workflows/cd_publish.yml — php-monorepo
#
# Publish PHP modules to Packagist on module version tags.
# Tag format: <module_name>-v<semver>  e.g. core-v1.0.0
#
# Required secrets: PACKAGIST_USERNAME, PACKAGIST_TOKEN

name: Publish Module

on:
  push:
    tags:
      - "*-v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci-gate:
    name: CI gate (lint + test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, xml, ctype, fileinfo, pdo, sqlite3, dom, curl, zip
          coverage: none
          tools: composer:v2

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Composer dependencies (all modules)
        run: |
          for dir in modules/*/; do
            if [ -f "$dir/composer.json" ]; then
              composer install --no-interaction --prefer-dist --working-dir="$dir"
            fi
          done

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

  publish:
    name: Publish to Packagist
    runs-on: ubuntu-latest
    needs: ci-gate
    if: github.repository_owner == github.event.repository.owner.login

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract module info from tag
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          MODULE="${TAG%-v*}"
          VERSION="${TAG##*-v}"
          echo "module=$MODULE"   >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing: $MODULE @ $VERSION"

      - name: Validate composer.json version
        run: |
          MODULE="${{ steps.tag.outputs.module }}"
          VERSION="${{ steps.tag.outputs.version }}"
          COMPOSER_VERSION=$(jq -r '.version' "modules/$MODULE/composer.json")
          if [ "$COMPOSER_VERSION" != "$VERSION" ]; then
            echo "ERROR: composer.json version ($COMPOSER_VERSION) != tag ($VERSION)"
            exit 1
          fi

      - name: Trigger Packagist update
        run: |
          MODULE="${{ steps.tag.outputs.module }}"
          PACKAGE_NAME=$(jq -r '.name' "modules/$MODULE/composer.json")
          curl -s -X POST \
            "https://packagist.org/api/update-package?username=${{ secrets.PACKAGIST_USERNAME }}&apiToken=${{ secrets.PACKAGIST_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"repository\":{\"url\":\"https://github.com/${{ github.repository }}\"}}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ steps.tag.outputs.module }} v${{ steps.tag.outputs.version }}"
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
