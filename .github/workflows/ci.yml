# .github/workflows/ci.yml — php-monorepo
#
# Continuous Integration — runs on every PR and push to main/develop.
#
# Pipeline:
#   1. Checkout + setup (Node/pnpm, PHP, Composer)
#   2. pnpm install (Turborepo orchestration only — no JS apps)
#   3. Composer install in every workspace
#   4. Laravel app setup (.env, key:generate, migrate)
#   5. Lint + Test via Turborepo
#   6. Coverage upload to Codecov

name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint · Test · Coverage
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: ["8.2", "8.3", "8.4"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, ctype, fileinfo, pdo, sqlite3, dom, curl, zip
          coverage: xdebug
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-php${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-php${{ matrix.php }}-

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Composer dependencies (all workspaces)
        run: |
          for dir in applications/*/  modules/*/; do
            if [ -f "$dir/composer.json" ]; then
              echo "→ composer install in $dir"
              composer install --no-interaction --prefer-dist --optimize-autoloader --working-dir="$dir"
            fi
          done

      - name: Prepare Laravel applications
        run: |
          for dir in applications/*/; do
            if [ -f "$dir/artisan" ]; then
              echo "→ Preparing $dir"
              cp "$dir/.env.example" "$dir/.env"
              php "$dir/artisan" key:generate
              php "$dir/artisan" migrate --force
            fi
          done

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: "**/coverage.xml,**/clover.xml"
          fail_ci_if_error: false
