# .github/workflows/cd_deploy.yml — php-monorepo
#
# Deploy Laravel applications on push to main (staging) or v* tags (production).
#
# Required secrets: DEPLOY_SSH_KEY, DEPLOY_HOST, DEPLOY_USER, DEPLOY_PATH

name: Deploy Applications

on:
  push:
    branches: [main]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  context:
    name: Resolve deploy environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - name: Determine environment
        id: env
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy ${{ matrix.app }} → ${{ needs.context.outputs.environment }}
    runs-on: ubuntu-latest
    needs: context
    environment: ${{ needs.context.outputs.environment }}

    strategy:
      matrix:
        app: [api-app]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, xml, ctype, fileinfo, pdo, sqlite3, dom, curl, zip
          coverage: none
          tools: composer:v2

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build --filter=${{ matrix.app }}

      - name: Install Composer dependencies (production)
        run: |
          composer install \
            --no-interaction \
            --prefer-dist \
            --optimize-autoloader \
            --no-dev \
            --working-dir=applications/${{ matrix.app }}

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          rsync -avz --delete \
            --exclude='.env' \
            --exclude='storage/' \
            --exclude='.git/' \
            applications/${{ matrix.app }}/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/

      - name: Run post-deploy commands
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'ENDSSH'
            cd ${{ secrets.DEPLOY_PATH }}
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan queue:restart
          ENDSSH
