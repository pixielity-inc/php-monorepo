<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#12101A"/>
    </linearGradient>
    <linearGradient id="topLine" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8892BF" stop-opacity="0"/>
      <stop offset="30%" stop-color="#8892BF"/>
      <stop offset="70%" stop-color="#4F5B93"/>
      <stop offset="100%" stop-color="#4F5B93" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="divLine" x1="0" y1="0" x2="0" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8892BF" stop-opacity="0"/>
      <stop offset="40%" stop-color="#8892BF" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#8892BF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8892BF" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip"><rect width="1200" height="360" rx="14"/></clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="1200" height="360" fill="url(#bg)"/>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.8" fill="#21262D"/>
    </pattern>
    <rect width="1200" height="360" fill="url(#dots)"/>
    <rect x="0" y="0" width="1200" height="2.5" fill="url(#topLine)"/>

    <!-- ═══════════════ LEFT PANEL ═══════════════ -->

    <!-- PHP official logo — purple pill with "php" text -->
    <g transform="translate(52, 118)">
      <!-- outer pill -->
      <ellipse cx="68" cy="48" rx="68" ry="48" fill="#4F5B93"/>
      <!-- inner pill highlight -->
      <ellipse cx="68" cy="48" rx="58" ry="38" fill="#8892BF" opacity="0.25"/>
      <!-- PHP text -->
      <text x="68" y="57"
        font-family="'Arial Black','Helvetica Neue',Helvetica,sans-serif"
        font-size="30" font-weight="900" fill="#FFFFFF"
        text-anchor="middle" letter-spacing="1">php</text>
    </g>

    <!-- Laravel flame — small, to the right of PHP logo -->
    <g transform="translate(196, 128)" opacity="0.75">
      <path d="M16,0 C18,12 26,18 28,32 C30,18 38,12 40,0 C38,14 32,20 28,32 C24,20 18,14 16,0Z" fill="#FF2D20"/>
      <path d="M4,8 C6,18 12,22 14,32 C16,22 22,18 24,8 C22,18 18,22 14,32 C10,22 6,18 4,8Z" fill="#FF6B6B" opacity="0.7"/>
    </g>

    <!-- Title — starts at x=240 (clear of both icons) -->
    <text x="240" y="152"
      font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif"
      font-size="44" font-weight="700" fill="#E6EDF3" letter-spacing="-0.5">PHP Monorepo</text>

    <!-- Subtitle -->
    <text x="240" y="190"
      font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif"
      font-size="15.5" fill="#8B949E">Production-ready Laravel monorepo template</text>
    <text x="240" y="212"
      font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif"
      font-size="15.5" fill="#8B949E">Turborepo · nWidart Modules · Rector · PHPStan</text>

    <!-- Badge row 1 -->
    <g transform="translate(240, 232)">
      <rect x="0"   y="0" width="90" height="26" rx="5" fill="#FF2D20" fill-opacity="0.1" stroke="#FF2D20" stroke-width="0.8" stroke-opacity="0.6"/>
      <text x="45"  y="17.5" font-family="system-ui,sans-serif" font-size="11.5" font-weight="600" fill="#FCA5A5" text-anchor="middle">Laravel 13</text>

      <rect x="100" y="0" width="76" height="26" rx="5" fill="#8892BF" fill-opacity="0.1" stroke="#8892BF" stroke-width="0.8" stroke-opacity="0.6"/>
      <text x="138" y="17.5" font-family="system-ui,sans-serif" font-size="11.5" font-weight="600" fill="#A5B4FC" text-anchor="middle">PHP 8.4</text>

      <rect x="186" y="0" width="90" height="26" rx="5" fill="#EF4444" fill-opacity="0.1" stroke="#EF4444" stroke-width="0.8" stroke-opacity="0.6"/>
      <text x="231" y="17.5" font-family="system-ui,sans-serif" font-size="11.5" font-weight="600" fill="#FCA5A5" text-anchor="middle">Turborepo</text>
    </g>

    <!-- Badge row 2 -->
    <g transform="translate(240, 268)">
      <rect x="0"   y="0" width="110" height="26" rx="5" fill="#10B981" fill-opacity="0.1" stroke="#10B981" stroke-width="0.8" stroke-opacity="0.6"/>
      <text x="55"  y="17.5" font-family="system-ui,sans-serif" font-size="11.5" font-weight="600" fill="#6EE7B7" text-anchor="middle">nWidart Mod.</text>

      <rect x="120" y="0" width="76" height="26" rx="5" fill="#F59E0B" fill-opacity="0.1" stroke="#F59E0B" stroke-width="0.8" stroke-opacity="0.6"/>
      <text x="158" y="17.5" font-family="system-ui,sans-serif" font-size="11.5" font-weight="600" fill="#FCD34D" text-anchor="middle">Rector 2</text>

      <rect x="206" y="0" width="84" height="26" rx="5" fill="#60A5FA" fill-opacity="0.1" stroke="#60A5FA" stroke-width="0.8" stroke-opacity="0.6"/>
      <text x="248" y="17.5" font-family="system-ui,sans-serif" font-size="11.5" font-weight="600" fill="#93C5FD" text-anchor="middle">PHPStan 2</text>
    </g>

    <!-- divider -->
    <rect x="640" y="0" width="1" height="360" fill="url(#divLine)"/>

    <!-- ═══════════════ RIGHT PANEL ═══════════════ -->
    <text x="672" y="72"
      font-family="system-ui,sans-serif" font-size="10.5" font-weight="700"
      fill="#484F58" letter-spacing="2.5">FEATURES</text>

    <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif"
       font-size="14" fill="#C9D1D9">
      <text x="672" y="108"><tspan fill="#8892BF">›</tspan><tspan dx="10">Laravel 13 + nWidart Modules (monorepo)</tspan></text>
      <text x="672" y="144"><tspan fill="#8892BF">›</tspan><tspan dx="10">Auto path repos · composer env:dev/prod</tspan></text>
      <text x="672" y="180"><tspan fill="#8892BF">›</tspan><tspan dx="10">PHPStan 2 · Rector 2 · Laravel Pint</tspan></text>
      <text x="672" y="216"><tspan fill="#8892BF">›</tspan><tspan dx="10">GitHub Actions — CI, deploy, publish</tspan></text>
      <text x="672" y="252"><tspan fill="#8892BF">›</tspan><tspan dx="10">Kiro MCP — Laravel docs + Playwright</tspan></text>
      <text x="672" y="288"><tspan fill="#8892BF">›</tspan><tspan dx="10">Packagist publish · CodeQL · Dependabot</tspan></text>
    </g>

    <!-- bottom bar -->
    <rect x="0" y="328" width="1200" height="32" fill="#010409" fill-opacity="0.7"/>
    <text x="56" y="349" font-family="system-ui,sans-serif" font-size="11.5" fill="#484F58">github.com/pixielity-inc/php-monorepo</text>
    <text x="1144" y="349" font-family="system-ui,sans-serif" font-size="11.5" fill="#484F58" text-anchor="end">MIT License</text>
  </g>
</svg>
